<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gracias · Riviera Residencial</title>
    <meta name="robots" content="noindex">
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100svh; display: flex; align-items: center; justify-content: center;
            background: #0a1a26; color: #faf8f4; padding: 24px;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; text-align: center;
        }
        .card { max-width: 520px; }
        .mark { letter-spacing: 0.04em; font-size: 2rem; font-weight: 300; }
        .mark small { display:block; letter-spacing: 0.34em; font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; margin-top: 6px; }
        h1 { font-weight: 300; font-size: 2rem; margin: 32px 0 12px; }
        p { color: rgba(244,240,231,0.75); line-height: 1.6; }
        a.btn {
            display: inline-block; margin-top: 28px; padding: 14px 30px; border-radius: 999px;
            background: #b6914f; color: #faf8f4; text-decoration: none; font-size: 0.72rem;
            letter-spacing: 0.22em; text-transform: uppercase; transition: background 0.3s;
        }
        a.btn:hover { background: #cdab74; }
    </style>
</head>
<body>
    <div class="card">
        <div class="mark">Riviera<small>Residencial</small></div>
        <h1>¡Gracias!</h1>
        <p>Hemos recibido tu solicitud. Un asesor de Riviera Residencial se pondrá en contacto contigo muy pronto con la información de disponibilidad, modelos y recorridos.</p>
        <a class="btn" href="/">Volver al inicio</a>
    </div>
</body>
</html>
